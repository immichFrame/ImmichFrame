<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ImmichFrame - Stable</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
        }

        .nocursor {
            cursor: none !important;
        }

        #main-container {
            position: relative;
            height: 100%;
            width: 100%;
            background-color: #000;
        }

        #bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 1;
            -webkit-filter: blur(20px);
            filter: blur(20px);
            -webkit-transform: scale(1.1) translateZ(0);
            transform: scale(1.1) translateZ(0);
            transition: opacity 1s ease-in-out;
            -webkit-transition: opacity 1s ease-in-out;
        }

        #img {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            margin: auto;
            z-index: 5;
            opacity: 1;
            max-width: 100%;
            max-height: 100%;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
            transition: opacity 1s ease-in-out;
            -webkit-transition: opacity 1s ease-in-out;
            object-fit: contain;
        }

        #controls {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            opacity: 0;
            -webkit-transition: opacity 0.5s ease-in-out;
            transition: opacity 0.5s ease-in-out;
            pointer-events: none;
            -webkit-transform: translateY(-50%);
            transform: translateY(-50%);
        }

        .show-controls #controls {
            opacity: 1;
        }

        .btn {
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 70px;
            height: 70px;
            font-size: 28px;
            cursor: pointer;
            border-radius: 50%;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
        }

        .btn:active {
            background: rgba(255, 255, 255, 0.3);
        }

        #info-stack {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 20;
            text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.9);
        }

        #clock {
            font-weight: 200;
            line-height: 1;
        }

        #weather-info {
            margin-top: 5px;
            display: none;
        }

        .meta-bar {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            text-align: right;
            text-shadow: 2px 2px 8px #000;
        }

        #location {
            font-size: 0.9em;
            opacity: 0.85;
            margin-top: 5px;
        }

        #error-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: #ff4444;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="main-container">
        <img id="bg-img" src="" />

        <div id="controls">
            <button class="btn" onclick="showPrevious()">&#9664;</button>
            <button class="btn" id="pauseBtn" onclick="togglePause()">&#10074;&#10074;</button>
            <button class="btn" onclick="loadNext()">&#9654;</button>
        </div>

        <div id="info-stack">
            <div id="clock"></div>
            <div id="weather-info"></div>
        </div>

        <img id="img" src="" />

        <div class="meta-bar">
            <span id="photoDate"></span>
            <span id="location"></span>
        </div>

        <div id="error-overlay">
            <h1>Connection Lost</h1>
            <p id="error-message">Unable to reach ImmichFrame server.</p>
        </div>
    </div>

    <script>
        function getQueryParam(name) {
            try {
                var results = new RegExp('[\?&]' + name + '=([^&#]*)').exec(window.location.href);
                return results ? decodeURIComponent(results[1]) : null;
            } catch (e) { return null; }
        }

        var authSecret = getQueryParam('authsecret') || "";
        var config = {};
        var intervalId = null;
        var weatherIntervalId = null;
        var clockStarted = false;

        var isPaused = false;
        var historyStack = [];
        var historyIndex = -1;
        var historyLimit = 10;
        var idleTimer = null;
        var idleWait = 3000;

        function showUI() {
            document.body.classList.remove("nocursor");
            document.getElementById("main-container").classList.add("show-controls");
            if (idleTimer) clearTimeout(idleTimer);
            idleTimer = setTimeout(hideUI, idleWait);
        }

        function hideUI() {
            document.body.classList.add("nocursor");
            document.getElementById("main-container").classList.remove("show-controls");
        }

        window.addEventListener('mousemove', showUI);
        window.addEventListener('touchstart', showUI);

        function showError(visible, msg) {
            var overlay = document.getElementById("error-overlay");
            if (msg) document.getElementById("error-message").innerHTML = msg;
            overlay.style.display = visible ? "flex" : "none";
        }

        function loadConfig() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "/api/Config?t=" + new Date().getTime(), true);
            if (authSecret) xhr.setRequestHeader('Authorization', 'Bearer ' + authSecret);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    showError(false);
                    config = JSON.parse(xhr.responseText);
                    applyConfig();
                } else if (xhr.readyState === 4) {
                    showError(true, "Server Error: " + xhr.status);
                    setTimeout(loadConfig, 10000);
                }
            };
            xhr.send();
        }

        function applyConfig() {
            var baseSize = config.baseFontSize ? parseFloat(config.baseFontSize) : 16;
            var themeColor = config.primaryColor || "#FFFFFF";
            var imgEl = document.getElementById("img");
            var bgImgEl = document.getElementById("bg-img");

            if (config.imageFill) {
                imgEl.style.objectFit = "cover";
                imgEl.style.width = "100%";
                imgEl.style.height = "100%";
                bgImgEl.style.display = "none";
            } else {
                imgEl.style.objectFit = "contain";
                imgEl.style.width = "auto";
                imgEl.style.height = "auto";
                bgImgEl.style.display = "block";
            }

            document.getElementById("clock").style.fontSize = (baseSize * 4) + "px";
            document.getElementById("clock").style.color = themeColor;
            document.getElementById("clock").style.display = config.showClock ? "block" : "none";
            document.getElementById("weather-info").style.color = themeColor;
            document.getElementById("photoDate").style.color = themeColor;
            document.getElementById("location").style.color = themeColor;

            if (config.showClock && !clockStarted) { updateClock(); clockStarted = true; }

            loadNext();
            resetInterval();

            loadWeather();
            if (weatherIntervalId) clearInterval(weatherIntervalId);
            weatherIntervalId = setInterval(loadWeather, 600000);

            var buttons = document.getElementsByClassName('btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].addEventListener('mouseenter', function () {
                    if (idleTimer) clearTimeout(idleTimer);
                });
                buttons[i].addEventListener('mouseleave', showUI);
            }
        }

        function resetInterval() {
            if (intervalId) clearInterval(intervalId);
            if (!isPaused) {
                intervalId = setInterval(loadNext, (config.interval || 20) * 1000);
            }
        }

        function togglePause() {
            isPaused = !isPaused;
            // ▶ for Resume, ❚❚ for Pause
            document.getElementById("pauseBtn").innerHTML = isPaused ? "&#9654;" : "&#10074;&#10074;";
            resetInterval();
        }

        function displayImageData(data) {
            if (!data) return;
            var imgEl = document.getElementById("img");
            var bgEl = document.getElementById("bg-img");

            imgEl.style.opacity = 0;
            bgEl.style.opacity = 0;

            setTimeout(function () {
                var b64 = "data:image/jpeg;base64," + data.randomImageBase64;
                imgEl.src = b64;
                if (!config.imageFill) {
                    bgEl.src = data.thumbHashImageBase64 ? ("data:image/jpeg;base64," + data.thumbHashImageBase64) : b64;
                    bgEl.style.opacity = 1;
                }

                document.getElementById("photoDate").innerHTML = data.photoDate || "";
                document.getElementById("location").innerHTML = data.imageLocation || "";
                imgEl.style.opacity = 1;
            }, 1050);
        }

        function showPrevious() {
            if (historyIndex > 0) {
                historyIndex--;
                displayImageData(historyStack[historyIndex]);
                resetInterval();
            }
        }

        function loadNext() {
            if (historyIndex < historyStack.length - 1) {
                historyIndex++;
                displayImageData(historyStack[historyIndex]);
                resetInterval();
                return;
            }

            var xhr = new XMLHttpRequest();
            xhr.open("GET", "/api/Asset/RandomImageAndInfo?t=" + new Date().getTime(), true);
            if (authSecret) xhr.setRequestHeader('Authorization', 'Bearer ' + authSecret);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    showError(false);
                    var data = JSON.parse(xhr.responseText);
                    if (data && data.randomImageBase64) {
                        historyStack.push(data);
                        if (historyStack.length > historyLimit) historyStack.shift();
                        historyIndex = historyStack.length - 1;
                        displayImageData(data);
                        resetInterval();
                    }
                }
            };
            xhr.send();
        }

        function updateClock() {
            var now = new Date();
            var h = now.getHours(), m = now.getMinutes();
            document.getElementById("clock").innerHTML = (h % 12 || 12) + ":" + (m < 10 ? "0" + m : m);
            setTimeout(updateClock, 1000);
        }

        function loadWeather() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "/api/Weather?t=" + new Date().getTime(), true);
            if (authSecret) xhr.setRequestHeader('Authorization', 'Bearer ' + authSecret);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    var el = document.getElementById("weather-info");
                    el.innerHTML = data.description + ", " + Math.round(data.temperature) + "°";
                    el.style.display = "block";
                }
            };
            xhr.send();
        }

        loadConfig();
    </script>
</body>

</html>
